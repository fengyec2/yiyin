version: 2
updates:
  # 保持 npm 依赖项最新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # 分组配置：将多个更新合并到一个 PR 中
    groups:
      dependencies:
        patterns:
          - "*" # 匹配所有依赖

  # 保持 GitHub Actions 最新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    # 分组配置：将所有 Action 更新合并到一个 PR 中
    groups:
      actions:
        patterns:
          - "*"
